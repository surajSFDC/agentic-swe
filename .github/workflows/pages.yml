# Build marketing site and deploy to GitHub Pages (project site: /<repo>/).
# Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: npm ci --prefix site

      - name: Build site (subpath for project Pages)
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build --prefix site

      # GitHub Pages has no SPA fallback; 404.html loads the app so client routes work on refresh/deep links.
      - name: SPA fallback
        run: cp site/dist/index.html site/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
