name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Vite 8 + @vitejs/plugin-react 6 require Node ^20.19 || >=22.12 (no Node 18).
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site/package-lock.json
            agents/plugin-runtime/brainstorm-server/package-lock.json

      - name: Install root dependencies (npm ci)
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Install brainstorm-server dependencies (npm ci)
        run: npm ci --prefix agents/plugin-runtime/brainstorm-server --registry=https://registry.npmjs.org/

      - name: Install site dependencies (npm ci)
        run: npm ci --prefix site --registry=https://registry.npmjs.org/

      - name: Lint site (ESLint + TypeScript-aware rules)
        run: npm run lint --prefix site

      - name: Build site (tsc + Vite)
        run: npm run build --prefix site

      - name: Verify pipeline layout
        run: npm run verify

      - name: Check version alignment (package + plugin manifests)
        run: npm run version:check

      - name: Validate Claude plugin manifest (if CLI on PATH)
        run: |
          if command -v claude >/dev/null 2>&1; then
            claude plugin validate "$GITHUB_WORKSPACE"
          else
            echo "::notice title=Claude CLI::claude not on PATH — skipping standalone validate (install-platform-stubs.test.js still validates manifests when claude is missing)"
          fi

      - name: Test (repo + platform wiring + plugin validate when claude available)
        run: npm test

      - name: Work engine CLI (help smoke)
        run: node scripts/work-engine.cjs help
