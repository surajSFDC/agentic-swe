name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dev dependencies
        run: npm install

      - name: Install brainstorm-server dependencies
        run: npm install --prefix tools/brainstorm-server --registry=https://registry.npmjs.org/

      - name: Install and build docs site (Vite)
        run: npm ci --prefix site --registry=https://registry.npmjs.org/ && npm run build --prefix site

      - name: Verify pipeline layout
        run: npm run verify

      - name: Test
        run: npm test
