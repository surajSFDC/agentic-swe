<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Brainstorm — agentic-swe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0c10;
      --bg-card: rgba(18, 22, 31, 0.72);
      --bg-elevated: rgba(28, 34, 48, 0.85);
      --border: rgba(120, 140, 180, 0.12);
      --text: #e8ecf4;
      --text-muted: #8b95a8;
      --accent: #5eead4;
      --accent-dim: rgba(94, 234, 212, 0.15);
      --accent-glow: rgba(94, 234, 212, 0.35);
      --danger: #f87171;
      --radius: 14px;
      --radius-sm: 8px;
      --font-sans: "Outfit", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: var(--font-sans);
      color: var(--text);
      background: var(--bg-deep);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient mesh */
    .backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(94, 234, 212, 0.12), transparent 50%),
        radial-gradient(ellipse 60% 40% at 100% 0%, rgba(99, 102, 241, 0.08), transparent 45%),
        radial-gradient(ellipse 50% 30% at 50% 100%, rgba(56, 189, 248, 0.06), transparent 40%),
        var(--bg-deep);
      pointer-events: none;
    }

    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.035;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .wrap {
      position: relative;
      z-index: 2;
      max-width: 560px;
      margin: 0 auto;
      padding: clamp(1.25rem, 4vw, 2.5rem) clamp(1rem, 3vw, 1.5rem) 3rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .mark {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent) 0%, #6366f1 100%);
      display: grid;
      place-items: center;
      box-shadow: 0 0 24px var(--accent-glow);
    }

    .mark svg {
      width: 22px;
      height: 22px;
      color: var(--bg-deep);
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 0.2rem;
      line-height: 1.2;
    }

    .tagline {
      margin: 0;
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1.45;
      max-width: 20rem;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text-muted);
      white-space: nowrap;
    }

    .status-pill[data-state="live"] {
      color: var(--accent);
      border-color: rgba(94, 234, 212, 0.35);
      background: var(--accent-dim);
    }

    .status-pill[data-state="error"] {
      color: var(--danger);
      border-color: rgba(248, 113, 113, 0.35);
      background: rgba(248, 113, 113, 0.1);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.85;
    }

    .status-pill[data-state="live"] .dot {
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    .card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.35rem;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    .card h2 {
      margin: 0 0 0.75rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    button {
      font-family: var(--font-sans);
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.55rem 1rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(94, 234, 212, 0.2) 0%, rgba(99, 102, 241, 0.15) 100%);
      color: var(--accent);
      border-color: rgba(94, 234, 212, 0.35);
    }

    .btn-primary:hover {
      box-shadow: 0 0 20px var(--accent-glow);
      border-color: rgba(94, 234, 212, 0.55);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: rgba(120, 140, 180, 0.25);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .field label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    input[type="text"] {
      width: 100%;
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      padding: 0.65rem 0.85rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input[type="text"]::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }

    input[type="text"]:focus {
      border-color: rgba(94, 234, 212, 0.45);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    #log {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      line-height: 1.55;
      min-height: 200px;
      max-height: min(42vh, 320px);
      overflow-y: auto;
      padding: 0.85rem 1rem;
      margin: 0;
      border-radius: var(--radius-sm);
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid var(--border);
      color: #c4cad8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #log:empty::before {
      content: "Activity will appear here…";
      color: var(--text-muted);
      font-style: italic;
    }

    footer {
      margin-top: auto;
      padding-top: 1rem;
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
    }

    footer code {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--accent);
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="backdrop" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <div class="wrap">
    <header>
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v3M12 18v3M3 12h3M18 12h3" />
            <circle cx="12" cy="12" r="4" />
          </svg>
        </div>
        <div>
          <h1>Brainstorm companion</h1>
          <p class="tagline">Local visual surface for the agentic-swe design phase. Pair with <code style="font-size:0.8em;opacity:0.9">/brainstorm</code> in Claude Code.</p>
        </div>
      </div>
      <span class="status-pill" id="conn" data-state="connecting" title="WebSocket status">
        <span class="dot" aria-hidden="true"></span>
        <span id="conn-label">Connecting</span>
      </span>
    </header>

    <section class="card" aria-labelledby="session-heading">
      <h2 id="session-heading">Session</h2>
      <div class="actions">
        <button type="button" class="btn-primary" id="ping">Ping server</button>
        <button type="button" class="btn-ghost" id="send">Send note</button>
        <button type="button" class="btn-ghost" id="clear">Clear log</button>
      </div>
      <div class="field">
        <label for="note">Companion note</label>
        <input id="note" type="text" autocomplete="off" placeholder="Short design note — sent as JSON companion message" />
      </div>
    </section>

    <section class="card" aria-labelledby="log-heading">
      <h2 id="log-heading">Activity</h2>
      <pre id="log" role="log" aria-live="polite"></pre>
    </section>

    <footer>
      WebSocket at <code>/ws</code> · Messages are echoed for agent tooling · 127.0.0.1 only
    </footer>
  </div>

  <script>
    (function () {
      const logEl = document.getElementById('log');
      const connEl = document.getElementById('conn');
      const connLabel = document.getElementById('conn-label');
      const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      let ws;

      function setConn(state, label) {
        connEl.dataset.state = state;
        connLabel.textContent = label;
      }

      function log(line) {
        const t = new Date().toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        logEl.textContent += '[' + t + '] ' + line + '\n';
        logEl.scrollTop = logEl.scrollHeight;
      }

      function pretty(data) {
        try {
          const o = JSON.parse(data);
          return JSON.stringify(o, null, 0);
        } catch {
          return data;
        }
      }

      function connect() {
        setConn('connecting', 'Connecting');
        ws = new WebSocket(wsProto + '//' + location.host + '/ws');
        ws.onopen = function () {
          setConn('live', 'Live');
        };
        ws.onclose = function () {
          setConn('error', 'Offline');
          log('(socket closed — retrying in 2s)');
          setTimeout(connect, 2000);
        };
        ws.onerror = function () {
          setConn('error', 'Error');
          log('(ws error)');
        };
        ws.onmessage = function (ev) {
          log('← ' + pretty(ev.data));
        };
      }

      connect();

      document.getElementById('ping').onclick = function () {
        log('→ ping');
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'ping' }));
        } else {
          log('(not connected)');
        }
      };

      document.getElementById('send').onclick = function () {
        const message = document.getElementById('note').value || '(empty)';
        log('→ companion');
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'companion', message: message }));
        } else {
          log('(not connected)');
        }
      };

      document.getElementById('clear').onclick = function () {
        logEl.textContent = '';
      };
    })();
  </script>
</body>
</html>
